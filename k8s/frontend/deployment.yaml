apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruber-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ruber-frontend
  template:
    metadata:
      labels:
        app: ruber-frontend
    spec:
      containers:
      - name: ruber-frontend
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80