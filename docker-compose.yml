services:
  redis:
    image: redis:latest
    container_name: redis-service
    ports:
      - "6389:6379"
    networks:
      - ruber-network

  postgresql:
    image: postgres:latest
    container_name: postgres-service
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ruber-network

  ruber-app:
    build: ./BackEnd/Uber
    container_name: ruber-app
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - SPRING_DATA_REDIS_HOST=redis-service
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - ruber-network

  ruber-ui:
    build: ./FrontEnd/uber-frontend
    container_name: ruber-ui
    ports:
      - "4200:4200"
    depends_on:
      - ruber-app
    networks:
      - ruber-network

networks:
  ruber-network:
    driver: bridge

volumes:
  postgres_data: